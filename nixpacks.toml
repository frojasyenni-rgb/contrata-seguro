# Nixpacks / Railway: instalar en el MISMO intérprete que usa Gunicorn (.venv).
# Pasos explícitos evitan que mercadopago quede fuera del venv si `pip` apunta a otro Python.
[phases.setup]
nixPkgs = ["tesseract"]

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "python -m pip install --no-cache-dir --index-url https://download.pytorch.org/whl/cpu torch torchvision",
  "python -m pip install --no-cache-dir -r requirements.txt",
  "python -m pip install --no-cache-dir 'mercadopago>=2.2.0'",
  'python -c "import mercadopago"',
  "python -m playwright install chromium --with-deps",
]

# Python lee PORT del entorno; evita literales "$PORT" en la línea de arranque.
[start]
cmd = "python entrypoint_gunicorn.py"
